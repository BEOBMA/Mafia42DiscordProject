services:
  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4
    container_name: lavalink
    restart: unless-stopped
    ports:
      - "2333:2333"
    environment:
      # application.yml 의 기본값을 덮어쓸 수 있습니다.
      LAVALINK_PASSWORD: ${LAVALINK_PASSWORD:-change-me-strong-password}
    volumes:
      - ./application.yml:/opt/Lavalink/application.yml:ro
